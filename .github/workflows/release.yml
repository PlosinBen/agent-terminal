name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.2.2)'
        required: true

permissions:
  contents: write

jobs:
  build-electron:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-22.04
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install setuptools (needed by node-gyp for node-pty)
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Install fuse (Linux AppImage)
        if: matrix.platform == 'linux'
        run: sudo apt-get install -y libfuse2

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run release -- --${{ matrix.platform }}

  build-server-tarball:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
          - os: ubuntu-22.04
            platform: linux
    runs-on: ${{ matrix.os }}
    needs: build-electron  # wait for release to be created
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build server tarball
        run: npm run build:server-tarball

      - name: Upload tarball to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          TARBALL=$(ls release/agent-terminal-server-*.tar.gz | head -1)
          gh release upload "$TAG" "$TARBALL" --clobber
